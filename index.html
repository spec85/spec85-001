<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拟物天气卡片 - 四季变幻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">四季天气</h1>
        <p class="subtitle">点击卡片或天气图标，感受四季的声音与变幻</p>
        
        <div class="cards-wrapper">
            <div class="card spring" data-season="spring">
                <div class="card-inner">
                    <div class="card-header">
                        <span class="season-label">春</span>
                        <span class="date">3月21日</span>
                    </div>
                    <div class="weather-icon" data-weather="sunny">
                        <svg viewBox="0 0 100 100" class="icon-sun">
                            <circle cx="50" cy="50" r="20" fill="#FFD93D"/>
                            <g class="sun-rays">
                                <line x1="50" y1="5" x2="50" y2="20" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="50" y1="80" x2="50" y2="95" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="5" y1="50" x2="20" y2="50" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="80" y1="50" x2="95" y2="50" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="18" y1="18" x2="28" y2="28" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="72" y1="72" x2="82" y2="82" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="18" y1="82" x2="28" y2="72" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                                <line x1="72" y1="28" x2="82" y2="18" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
                            </g>
                        </svg>
                    </div>
                    <div class="temperature">
                        <span class="temp-value">18°</span>
                        <span class="temp-unit">C</span>
                    </div>
                    <div class="weather-desc">晴朗微风</div>
                    <div class="plant-element">
                        <svg viewBox="0 0 60 60" class="sakura">
                            <g class="flower">
                                <ellipse cx="30" cy="15" rx="8" ry="12" fill="#FFB7C5" opacity="0.9"/>
                                <ellipse cx="18" cy="25" rx="8" ry="12" fill="#FFB7C5" opacity="0.9" transform="rotate(-72 18 25)"/>
                                <ellipse cx="22" cy="40" rx="8" ry="12" fill="#FFB7C5" opacity="0.9" transform="rotate(-144 22 40)"/>
                                <ellipse cx="38" cy="40" rx="8" ry="12" fill="#FFB7C5" opacity="0.9" transform="rotate(144 38 40)"/>
                                <ellipse cx="42" cy="25" rx="8" ry="12" fill="#FFB7C5" opacity="0.9" transform="rotate(72 42 25)"/>
                                <circle cx="30" cy="30" r="5" fill="#FFE66D"/>
                            </g>
                        </svg>
                        <span class="plant-name">樱花</span>
                    </div>
                    <div class="card-footer">
                        <div class="humidity">
                            <span class="label">湿度</span>
                            <span class="value">65%</span>
                        </div>
                        <div class="wind">
                            <span class="label">风速</span>
                            <span class="value">3级</span>
                        </div>
                    </div>
                </div>
                <div class="petals-container"></div>
            </div>

            <div class="card summer" data-season="summer">
                <div class="card-inner">
                    <div class="card-header">
                        <span class="season-label">夏</span>
                        <span class="date">6月21日</span>
                    </div>
                    <div class="weather-icon" data-weather="thunderstorm">
                        <svg viewBox="0 0 100 100" class="icon-thunder">
                            <g class="cloud-group">
                                <ellipse cx="35" cy="45" rx="22" ry="18" fill="#E0E0E0"/>
                                <ellipse cx="55" cy="40" rx="25" ry="20" fill="#F0F0F0"/>
                                <ellipse cx="70" cy="48" rx="20" ry="16" fill="#E8E8E8"/>
                            </g>
                            <polygon points="50,55 40,70 48,70 42,90 60,65 52,65 58,55" fill="#FFD93D" class="lightning"/>
                        </svg>
                    </div>
                    <div class="temperature">
                        <span class="temp-value">32°</span>
                        <span class="temp-unit">C</span>
                    </div>
                    <div class="weather-desc">雷阵雨</div>
                    <div class="plant-element">
                        <svg viewBox="0 0 60 60" class="lotus">
                            <ellipse cx="30" cy="45" rx="25" ry="8" fill="#90EE90"/>
                            <g class="lotus-flower">
                                <ellipse cx="30" cy="25" rx="6" ry="12" fill="#FFB6C1"/>
                                <ellipse cx="22" cy="28" rx="6" ry="12" fill="#FFB6C1" transform="rotate(-30 22 28)"/>
                                <ellipse cx="38" cy="28" rx="6" ry="12" fill="#FFB6C1" transform="rotate(30 38 28)"/>
                                <ellipse cx="25" cy="20" rx="5" ry="10" fill="#FFC0CB" transform="rotate(-15 25 20)"/>
                                <ellipse cx="35" cy="20" rx="5" ry="10" fill="#FFC0CB" transform="rotate(15 35 20)"/>
                                <circle cx="30" cy="25" r="4" fill="#FFD700"/>
                            </g>
                        </svg>
                        <span class="plant-name">荷花</span>
                    </div>
                    <div class="card-footer">
                        <div class="humidity">
                            <span class="label">湿度</span>
                            <span class="value">85%</span>
                        </div>
                        <div class="wind">
                            <span class="label">风速</span>
                            <span class="value">5级</span>
                        </div>
                    </div>
                </div>
                <div class="rain-container"></div>
            </div>

            <div class="card autumn" data-season="autumn">
                <div class="card-inner">
                    <div class="card-header">
                        <span class="season-label">秋</span>
                        <span class="date">9月23日</span>
                    </div>
                    <div class="weather-icon" data-weather="cloudy">
                        <svg viewBox="0 0 100 100" class="icon-cloud">
                            <g class="cloud-group">
                                <ellipse cx="30" cy="50" rx="20" ry="16" fill="#D0D0D0"/>
                                <ellipse cx="50" cy="45" rx="22" ry="18" fill="#E8E8E8"/>
                                <ellipse cx="68" cy="52" rx="18" ry="14" fill="#D8D8D8"/>
                                <ellipse cx="45" cy="55" rx="16" ry="12" fill="#C8C8C8"/>
                            </g>
                        </svg>
                    </div>
                    <div class="temperature">
                        <span class="temp-value">15°</span>
                        <span class="temp-unit">C</span>
                    </div>
                    <div class="weather-desc">多云转晴</div>
                    <div class="plant-element">
                        <svg viewBox="0 0 60 60" class="maple">
                            <g class="leaf">
                                <path d="M30,5 L35,25 L55,15 L40,30 L55,45 L35,35 L30,55 L25,35 L5,45 L20,30 L5,15 L25,25 Z" 
                                      fill="#FF6B35" stroke="#D4541E" stroke-width="1"/>
                                <line x1="30" y1="5" x2="30" y2="55" stroke="#D4541E" stroke-width="1"/>
                            </g>
                        </svg>
                        <span class="plant-name">枫叶</span>
                    </div>
                    <div class="card-footer">
                        <div class="humidity">
                            <span class="label">湿度</span>
                            <span class="value">55%</span>
                        </div>
                        <div class="wind">
                            <span class="label">风速</span>
                            <span class="value">4级</span>
                        </div>
                    </div>
                </div>
                <div class="leaves-container"></div>
            </div>

            <div class="card winter" data-season="winter">
                <div class="card-inner">
                    <div class="card-header">
                        <span class="season-label">冬</span>
                        <span class="date">12月22日</span>
                    </div>
                    <div class="weather-icon" data-weather="snowy">
                        <svg viewBox="0 0 100 100" class="icon-snow">
                            <g class="cloud-group">
                                <ellipse cx="35" cy="40" rx="20" ry="16" fill="#B8C5D6"/>
                                <ellipse cx="55" cy="35" rx="22" ry="18" fill="#C9D4E3"/>
                                <ellipse cx="72" cy="42" rx="18" ry="14" fill="#B8C5D6"/>
                            </g>
                            <g class="snowflakes">
                                <circle cx="35" cy="65" r="4" fill="#FFFFFF"/>
                                <circle cx="50" cy="75" r="5" fill="#FFFFFF"/>
                                <circle cx="65" cy="68" r="4" fill="#FFFFFF"/>
                                <circle cx="42" cy="85" r="3" fill="#FFFFFF"/>
                                <circle cx="58" cy="88" r="4" fill="#FFFFFF"/>
                            </g>
                        </svg>
                    </div>
                    <div class="temperature">
                        <span class="temp-value">-5°</span>
                        <span class="temp-unit">C</span>
                    </div>
                    <div class="weather-desc">小雪纷飞</div>
                    <div class="plant-element">
                        <svg viewBox="0 0 60 60" class="plum">
                            <g class="plum-branch">
                                <path d="M10,50 Q20,40 25,30 Q30,20 35,15" stroke="#5D4037" stroke-width="3" fill="none"/>
                                <path d="M25,30 Q35,25 40,20" stroke="#5D4037" stroke-width="2" fill="none"/>
                                <path d="M30,35 Q40,38 50,35" stroke="#5D4037" stroke-width="2" fill="none"/>
                            </g>
                            <g class="plum-flower">
                                <circle cx="35" cy="15" r="4" fill="#FF69B4"/>
                                <circle cx="32" cy="12" r="3" fill="#FF69B4"/>
                                <circle cx="38" cy="12" r="3" fill="#FF69B4"/>
                                <circle cx="32" cy="18" r="3" fill="#FF69B4"/>
                                <circle cx="38" cy="18" r="3" fill="#FF69B4"/>
                                <circle cx="35" cy="15" r="2" fill="#FFD700"/>
                                
                                <circle cx="42" cy="18" r="3" fill="#FF69B4"/>
                                <circle cx="40" cy="16" r="2" fill="#FF69B4"/>
                                <circle cx="44" cy="16" r="2" fill="#FF69B4"/>
                                <circle cx="40" cy="20" r="2" fill="#FF69B4"/>
                                <circle cx="44" cy="20" r="2" fill="#FF69B4"/>
                                <circle cx="42" cy="18" r="1.5" fill="#FFD700"/>
                                
                                <circle cx="50" cy="35" r="3" fill="#FF69B4"/>
                                <circle cx="48" cy="33" r="2" fill="#FF69B4"/>
                                <circle cx="52" cy="33" r="2" fill="#FF69B4"/>
                                <circle cx="48" cy="37" r="2" fill="#FF69B4"/>
                                <circle cx="52" cy="37" r="2" fill="#FF69B4"/>
                                <circle cx="50" cy="35" r="1.5" fill="#FFD700"/>
                            </g>
                        </svg>
                        <span class="plant-name">梅花</span>
                    </div>
                    <div class="card-footer">
                        <div class="humidity">
                            <span class="label">湿度</span>
                            <span class="value">45%</span>
                        </div>
                        <div class="wind">
                            <span class="label">风速</span>
                            <span class="value">2级</span>
                        </div>
                    </div>
                </div>
                <div class="snow-container"></div>
            </div>
        </div>

        <div class="controls">
            <button id="sound-toggle" class="control-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/>
                </svg>
                <span>音效开启</span>
            </button>
            <button id="animation-toggle" class="control-btn active">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/>
                </svg>
                <span>动画开启</span>
            </button>
        </div>

        <div class="hint">
            <p>💡 提示：点击任意卡片或天气图标，触发季节特效和声音</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
